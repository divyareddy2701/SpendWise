<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SpendWise — Sign In</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="login-wrap">
  <div class="login-bg"></div>
  <div class="login-grid-bg"></div>

  <button class="theme-btn" onclick="toggleTheme()"
          style="position:fixed;top:20px;right:20px" title="Toggle theme">
    <span id="theme-icon">☀️</span>
  </button>

  <div class="login-card">
    <div class="login-logo">
      <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px">
        <div style="width:40px;height:40px;background:linear-gradient(135deg,var(--gold),var(--gold-dk));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 16px var(--gold-glow)">💰</div>
        <div class="login-brand">Spend<span>Wise</span></div>
      </div>
      <div class="login-sub">Track every rupee · Grow every saving</div>
    </div>

    <div class="login-tabs">
      <button class="ltab active" data-tab="login" onclick="switchTab('login')">Sign In</button>
      <button class="ltab" data-tab="register" onclick="switchTab('register')">Register</button>
    </div>

    <div class="tab-panel" data-panel="login">
      <form id="form-login">
        <div class="form-group">
          <label class="form-label" for="login-user">Username</label>
          <input id="login-user" class="form-control" type="text"
                 placeholder="Enter your username" required autocomplete="username"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-pass">Password</label>
          <input id="login-pass" class="form-control" type="password"
                 placeholder="Enter your password" required autocomplete="current-password"/>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="btn-login">Sign In</button>
      </form>
    </div>

    <div class="tab-panel hidden" data-panel="register">
      <form id="form-register">
        <div class="form-group">
          <label class="form-label" for="reg-user">Username</label>
          <input id="reg-user" class="form-control" type="text"
                 placeholder="Choose a username (min 3 chars)" required autocomplete="username"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-pass">Password</label>
          <input id="reg-pass" class="form-control" type="password"
                 placeholder="Create a password (min 4 chars)" required autocomplete="new-password"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-pass2">Confirm Password</label>
          <input id="reg-pass2" class="form-control" type="password"
                 placeholder="Repeat password" required autocomplete="new-password"/>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="btn-register">Create Account</button>
      </form>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
