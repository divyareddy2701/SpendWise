<script src="script.js"></script>

<script>
  // ══════════════════════════════════════════
  //  NEW: Pagination + Date Filter + PDF
  //  These override/extend initExpenses()
  //  from script.js
  // ══════════════════════════════════════════

  const PAGE_SIZE = 10;
  let currentPage = 1;
  let filteredList = [];

  // Override initExpenses from script.js
  async function initExpenses() {
    await fetchExpenses();
    applyFilters();

    document.getElementById('inp-search')  ?.addEventListener('input',  () => { currentPage = 1; applyFilters(); });
    document.getElementById('sel-category')?.addEventListener('change', () => { currentPage = 1; applyFilters(); });
    document.getElementById('sel-sort')    ?.addEventListener('change', () => { currentPage = 1; applyFilters(); });
    document.getElementById('chk-rec')     ?.addEventListener('change', () => { currentPage = 1; applyFilters(); });
    document.getElementById('date-from')   ?.addEventListener('change', () => { currentPage = 1; applyFilters(); });
    document.getElementById('date-to')     ?.addEventListener('change', () => { currentPage = 1; applyFilters(); });
    document.getElementById('btn-export')  ?.addEventListener('click',  () => exportCSV(filteredList));
    document.getElementById('btn-pdf')     ?.addEventListener('click',  exportPDF);
  }

  // Override applyFilters from script.js
  function applyFilters() {
    const q        = (document.getElementById('inp-search')?.value   || '').toLowerCase();
    const cat      =  document.getElementById('sel-category')?.value || '';
    const srt      =  document.getElementById('sel-sort')?.value     || 'date-desc';
    const rec      =  document.getElementById('chk-rec')?.checked    || false;
    const fromDate =  document.getElementById('date-from')?.value    || '';
    const toDate   =  document.getElementById('date-to')?.value      || '';

    filteredList = [...allExpenses].filter(e => {
      const mq   = !q        || (e.title||'').toLowerCase().includes(q) || (e.category||'').toLowerCase().includes(q);
      const mc   = !cat      || e.category === cat;
      const mr   = !rec      || e.recurring;
      const mfrom= !fromDate || e.date >= fromDate;
      const mto  = !toDate   || e.date <= toDate;
      return mq && mc && mr && mfrom && mto;
    });

    filteredList.sort((a, b) => {
      if (srt === 'date-desc') return new Date(b.date) - new Date(a.date);
      if (srt === 'date-asc')  return new Date(a.date) - new Date(b.date);
      if (srt === 'amt-desc')  return parseFloat(b.amount) - parseFloat(a.amount);
      if (srt === 'amt-asc')   return parseFloat(a.amount) - parseFloat(b.amount);
      return 0;
    });

    // Update count + total
    document.getElementById('exp-count').textContent =
      filteredList.length + ' expense' + (filteredList.length !== 1 ? 's' : '');
    document.getElementById('exp-total').textContent =
      '₹' + fmt(filteredList.reduce((s, e) => s + parseFloat(e.amount||0), 0));

    renderCatSummary(filteredList);
    renderPage(currentPage);
    renderPagination();
  }

  // Render only 10 items for current page
  function renderPage(page) {
    const start = (page - 1) * PAGE_SIZE;
    const end   = start + PAGE_SIZE;
    const slice = filteredList.slice(start, end);
    renderExpTable(slice);
  }

  // Pagination controls
  function renderPagination() {
    const total = Math.ceil(filteredList.length / PAGE_SIZE);
    const el    = document.getElementById('pagination');
    if (!el) return;

    if (total <= 1) { el.innerHTML = ''; return; }

    let html = '';

    // Prev button
    html += `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;

    // Page numbers
    for (let i = 1; i <= total; i++) {
      // Show first, last, and pages around current
      if (i === 1 || i === total || (i >= currentPage-2 && i <= currentPage+2)) {
        html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
      } else if (i === currentPage-3 || i === currentPage+3) {
        html += `<span class="page-info">…</span>`;
      }
    }

    // Next button
    html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>›</button>`;

    // Page info
    const start = (currentPage-1)*PAGE_SIZE + 1;
    const end   = Math.min(currentPage*PAGE_SIZE, filteredList.length);
    html += `<span class="page-info">${start}–${end} of ${filteredList.length}</span>`;

    el.innerHTML = html;
  }

  function goPage(page) {
    const total = Math.ceil(filteredList.length / PAGE_SIZE);
    if (page < 1 || page > total) return;
    currentPage = page;
    renderPage(currentPage);
    renderPagination();
    // Scroll to top of table
    document.querySelector('.tbl-wrap')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // Category summary pills
  function renderCatSummary(list) {
    const el = document.getElementById('cat-summary');
    if (!el || !list.length) { el.innerHTML = ''; return; }

    const map = {};
    list.forEach(e => { map[e.category] = (map[e.category]||0) + parseFloat(e.amount||0); });

    el.innerHTML = Object.entries(map)
      .sort((a,b) => b[1]-a[1])
      .map(([cat, amt]) =>
        `<div class="cat-pill">${cat}: <strong>₹${fmt(amt)}</strong></div>`
      ).join('');
  }

  // Clear date filters
  function clearDates() {
    document.getElementById('date-from').value = '';
    document.getElementById('date-to').value   = '';
    currentPage = 1;
    applyFilters();
  }

  // PDF Export
  function exportPDF() {
    if (!filteredList.length) { toast('No expenses to export', 'error'); return; }

    const total = filteredList.reduce((s,e) => s+parseFloat(e.amount||0), 0);
    const now   = new Date().toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric' });

    const catTotals = {};
    filteredList.forEach(e => { catTotals[e.category] = (catTotals[e.category]||0) + parseFloat(e.amount||0); });

    const catRows = Object.entries(catTotals).sort((a,b)=>b[1]-a[1])
      .map(([cat,amt]) => `<tr><td>${cat}</td><td>₹${fmt(amt)}</td></tr>`).join('');

    const expRows = filteredList.map(e => `
      <tr>
        <td>${e.title||'—'}</td>
        <td>${e.category||'—'}</td>
        <td>₹${fmt(e.amount)}</td>
        <td>${e.date||'—'}</td>
        <td>${e.recurring ? '🔁 Recurring' : 'One-time'}</td>
      </tr>`).join('');

    const win = window.open('', '_blank');
    win.document.write(`<!DOCTYPE html><html><head>
    <title>SpendWise Expenses</title>
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:Arial,sans-serif;padding:36px;color:#333}
      h1{color:#f5a623;font-size:24px;margin-bottom:4px}
      .sub{color:#888;font-size:13px;margin-bottom:20px}
      .summary{display:flex;gap:12px;margin-bottom:24px}
      .box{flex:1;background:#f8f9fa;padding:14px;border-radius:8px;text-align:center;border:1px solid #eee}
      .box .val{font-size:20px;font-weight:700;color:#f5a623}
      .box .lbl{font-size:11px;color:#888;margin-top:3px}
      h2{font-size:14px;margin:0 0 10px;color:#555}
      table{width:100%;border-collapse:collapse;margin-bottom:24px}
      th{background:#1a1f2e;color:white;padding:9px 12px;text-align:left;font-size:12px}
      td{padding:8px 12px;border-bottom:1px solid #eee;font-size:12px}
      tr:nth-child(even) td{background:#fafafa}
      .footer{color:#bbb;font-size:11px;text-align:center;margin-top:16px}
    </style></head><body>
    <h1>💰 SpendWise — Expense Report</h1>
    <p class="sub">Generated on ${now} · ${filteredList.length} transactions</p>
    <div class="summary">
      <div class="box"><div class="val">₹${fmt(total)}</div><div class="lbl">Total Spent</div></div>
      <div class="box"><div class="val">${filteredList.length}</div><div class="lbl">Transactions</div></div>
      <div class="box"><div class="val">${Object.keys(catTotals).length}</div><div class="lbl">Categories</div></div>
    </div>
    <h2>📊 By Category</h2>
    <table><thead><tr><th>Category</th><th>Total</th></tr></thead><tbody>${catRows}</tbody></table>
    <h2>🧾 All Transactions</h2>
    <table>
      <thead><tr><th>Title</th><th>Category</th><th>Amount</th><th>Date</th><th>Type</th></tr></thead>
      <tbody>${expRows}</tbody>
    </table>
    <p class="footer">SpendWise — Your personal expense tracker</p>
    </body></html>`);
    win.document.close();
    setTimeout(() => win.print(), 500);
  }

  // Close modal on overlay click
  document.addEventListener('click', e => {
    if (e.target.id === 'edit-modal') closeEditModal();
  });
</script>
</body>
</html>
